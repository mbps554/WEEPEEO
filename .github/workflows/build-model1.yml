name: Build Trezor 1 Firmware

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git reference (branch, tag, or commit)'
        required: false
        default: 'main'

jobs:
  build-trezor1:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Build Trezor 1 (Legacy) firmware
        run: |
          chmod +x ./build-docker.sh
          ./build-docker.sh --models T1B1 --skip-bitcoinonly main
        env:
          PRODUCTION: 0
      
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trezor1-firmware
          path: |
            build/legacy-T1B1/
          retention-days: 30
        if: always()
      
      - name: List build artifacts
        run: |
          echo "=== Build Artifacts ==="
          find build/legacy-T1B1 -type f | head -20 || echo "No artifacts found"
